<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D 跨页魔法绘本 - 移动端秒开旗舰版</title>
    <style>
        :root {
            --book-width: 4000px; 
            --book-height: 1452px; 
            --btn-bg: rgba(26, 26, 26, 0.98);
            --btn-hover: rgba(0, 0, 0, 1);
            --z-gap: 50px; 
        }

        html, body {
            background-color: #000; 
            margin: 0; padding: 0;
            overflow: hidden; 
            width: 100%; height: 100%;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            /* 背景图也做了优化，只在完全加载后显示 */
            background-color: #050505;
        }

        /* ---------------------------------------------------
           新增：微信秒开加载屏
        --------------------------------------------------- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; font-family: sans-serif;
            transition: opacity 0.8s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .app-wrapper {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; position: relative;
            cursor: grab;
            perspective: 45000px; 
            perspective-origin: center;
            opacity: 0; /* 初始隐藏，加载完淡入 */
            transition: opacity 1s ease;
        }
        .app-wrapper.loaded { opacity: 1; }
        .app-wrapper:active { cursor: grabbing; }

        #viewManipulator {
            display: flex; justify-content: center; align-items: center;
            transform-origin: center center;
            transform-style: preserve-3d;
        }

        .book {
            width: var(--book-width); 
            height: var(--book-height);
            position: relative;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .book::after {
            content: "";
            position: absolute; left: 50%; top: 0;
            width: 16px; height: 100%;
            background: #000;
            transform: translateX(-50%) translateZ(1200px); 
            z-index: 100000;
            box-shadow: 0 0 80px rgba(0,0,0,1);
            pointer-events: none;
        }

        .page {
            width: 50%; height: 100%;
            position: absolute; right: 0; top: 0;
            transform-origin: left center;
            transform-style: preserve-3d; 
            margin-left: -2px;
            background-color: #000; 
            transform: translate3d(0, 0, calc(var(--z) * var(--z-gap) + var(--lift, 0px))) rotateY(0.01deg);
            transition: transform 1s cubic-bezier(0.25, 0, 0.1, 1);
            cursor: pointer;
            border-radius: 0 48px 48px 0;
            pointer-events: auto;
            visibility: hidden; 
        }

        .page.flipped {
            transform: translate3d(10px, 0, calc(var(--z) * var(--z-gap) + var(--lift, 0px))) rotateY(-179.99deg);
        }

        /* 高清纹理层 */
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            overflow: hidden; 
            background-color: #0a0a0a; 
            outline: 1px solid transparent; 
            background-size: 200.2% 100.2%; 
            background-repeat: no-repeat;
            
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            -webkit-font-smoothing: antialiased;
        }

        .front {
            border-radius: 0 48px 48px 0;
            background-position: right;
            background-image: linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 8%);
        }

        .back {
            border-radius: 48px 0 0 48px;
            transform: rotateY(180deg);
            background-position: left;
            background-image: linear-gradient(to left, rgba(0,0,0,0.5) 0%, transparent 8%);
        }

        /* 封面特化 */
        .cover { background-size: 100% 100% !important; border-left: 8px solid #000; }
        .cover-back { background-size: 100% 100% !important; border-right: 8px solid #000; }

        .front::after, .back::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 100%);
        }
        .page.flipping .front::after, .page.flipping .back::after { opacity: 0.5; }

        /* 胶囊按钮 */
        .expand-btn {
            position: absolute; right: 140px; top: 140px;
            background: var(--btn-bg); color: #fff; padding: 56px 180px; 
            border-radius: 400px; font-size: 60px; font-weight: 600; cursor: pointer; 
            border: 4px solid rgba(255,255,255,0.1); z-index: 600000; box-shadow: 0 60px 200px rgba(0,0,0,0.9);
            backdrop-filter: blur(140px); -webkit-backdrop-filter: blur(140px);
            transition: all 0.4s ease;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .expand-btn:hover { background: var(--btn-hover); transform: scale(1.05) translateY(-8px); }
        .is-expanded .expand-btn { top: -250px; right: 0; background: #000; }

        .page-foldout { overflow: visible !important; }
        .page-foldout .front { 
            overflow: visible !important; 
            transform-style: preserve-3d !important; 
            border-radius: 0 !important; 
        }
        
        .foldout-container {
            position: absolute; width: 100%; height: 100%; right: 0; top: 0;
            transform-style: preserve-3d; visibility: hidden; opacity: 0;
            pointer-events: none; transition: opacity 0.5s;
            z-index: 500000;
        }
        .is-expanded .foldout-container { visibility: visible; opacity: 1; pointer-events: auto; }
        
        .flap {
            position: absolute; width: 100%; height: 100%; right: -100%; top: 0;
            transform-origin: left center; transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.8s;
            background-color: #0a0a0a; box-shadow: -100px 0 250px rgba(0,0,0,0.8);
            background-size: 400.2% 100.2% !important; background-repeat: no-repeat;
            image-rendering: high-quality;
            transform: translateZ(4px) rotateY(-180deg); 
        }
        .is-expanded .flap { 
            transform: translateZ(0px) rotateY(0deg); 
            box-shadow: none; 
        }

        .flap-1 { background-position: 66.6% !important; z-index: 10; }
        .flap-2 { background-position: 100% !important; z-index: 11; border-radius: 0 48px 48px 0; }
        .p14-left, .p15-left { background-size: 400.2% 100.2% !important; background-position: 0% !important; }
        .p14-right, .p15-right { background-size: 400.2% 100.2% !important; background-position: 33.3% !important; }

    </style>
</head>
<body>

    <!-- 加载屏幕 -->
    <div id="loader">
        <div class="spinner"></div>
        <div>魔法绘本加载中...</div>
    </div>

    <div class="app-wrapper" id="appWrapper">
        <div id="viewManipulator">
            <div class="book" id="book">
                <!-- 
                    核心改动：把 style="background-image:..." 全部替换成 data-bg="..."
                    这样浏览器就不会一打开就疯狂下载几百兆图片，而是等 JS 通知后再下载。
                -->
                <div class="page"><div class="front cover" data-bg="封面.jpg"></div><div class="back" data-bg="1.jpg"></div></div>
                <div class="page"><div class="front" data-bg="1.jpg"></div><div class="back" data-bg="2.jpg"></div></div>
                <div class="page"><div class="front" data-bg="2.jpg"></div><div class="back" data-bg="3.jpg"></div></div>
                <div class="page"><div class="front" data-bg="3.jpg"></div><div class="back" data-bg="4.jpg"></div></div>
                <div class="page"><div class="front" data-bg="4.jpg"></div><div class="back" data-bg="5.jpg"></div></div>
                <div class="page"><div class="front" data-bg="5.jpg"></div><div class="back" data-bg="6.jpg"></div></div>
                <div class="page"><div class="front" data-bg="6.jpg"></div><div class="back" data-bg="7.jpg"></div></div>
                <div class="page"><div class="front" data-bg="7.jpg"></div><div class="back" data-bg="8.jpg"></div></div>
                <div class="page"><div class="front" data-bg="8.jpg"></div><div class="back" data-bg="9.jpg"></div></div>
                <div class="page"><div class="front" data-bg="9.jpg"></div><div class="back" data-bg="10.jpg"></div></div>
                <div class="page"><div class="front" data-bg="10.jpg"></div><div class="back" data-bg="11.jpg"></div></div>
                <div class="page"><div class="front" data-bg="11.jpg"></div><div class="back" data-bg="12.jpg"></div></div>
                <div class="page"><div class="front" data-bg="12.jpg"></div><div class="back" data-bg="13.jpg"></div></div>
                
                <div class="page"><div class="front" data-bg="13.jpg"></div><div class="back p14-left" data-bg="14.jpg"></div></div>
                
                <!-- 长图 14 -->
                <div class="page page-foldout" id="page14">
                    <div class="front p14-right" data-bg="14.jpg">
                        <div class="expand-btn" onclick="toggleFoldout(event, 'page14')">展开全图</div>
                        <div class="foldout-container">
                            <div class="flap flap-1" data-bg="14.jpg">
                                <div class="flap flap-2" data-bg="14.jpg"></div>
                            </div>
                        </div>
                    </div>
                    <div class="back p15-left" data-bg="15.jpg"></div>
                </div>

                <!-- 长图 15 -->
                <div class="page page-foldout" id="page15">
                    <div class="front p15-right" data-bg="15.jpg">
                        <div class="expand-btn" onclick="toggleFoldout(event, 'page15')">展开全图</div>
                        <div class="foldout-container">
                            <div class="flap flap-1" data-bg="15.jpg">
                                <div class="flap flap-2" data-bg="15.jpg"></div>
                            </div>
                        </div>
                    </div>
                    <div class="back" data-bg="16.jpg"></div>
                </div>

                <div class="page"><div class="front" data-bg="16.jpg"></div><div class="back" data-bg="17.jpg"></div></div>
                <div class="page"><div class="front" data-bg="17.jpg"></div><div class="back" data-bg="18.jpg"></div></div>
                <div class="page"><div class="front" data-bg="18.jpg"></div><div class="back cover-back" data-bg="封底.jpg"></div></div>
            </div>
        </div>
    </div>

    <script>
        const pages = document.querySelectorAll('.page');
        const book = document.getElementById('book');
        const manipulator = document.getElementById('viewManipulator');
        const appWrapper = document.getElementById('appWrapper');
        const loader = document.getElementById('loader');

        let currentPage = 0; 
        let curS = 1; 
        let tarS = 1;
        let isEngineRunning = false;

        let isDragging = false;
        let startPtrX = 0, startPtrY = 0;
        let panX = 0, panY = 0;
        let tarPanX = 0, tarPanY = 0;
        let ptrMoveDist = 0;

        let pointerCache = [];
        let initialDistance = 0;
        let initialScale = 1;
        let isPinching = false;

        // ----------------------------------------------------------------
        // 核心技术：按需注入图片 (Lazy Loader)
        // ----------------------------------------------------------------
        function loadImagesForPage(pageElement) {
            // 找到该页面下所有带有 data-bg 的元素
            const elements = pageElement.querySelectorAll('[data-bg]');
            elements.forEach(el => {
                // 如果还没加载过，才去加载
                if (el.getAttribute('data-loaded') !== 'true') {
                    const bgUrl = el.getAttribute('data-bg');
                    el.style.backgroundImage = `url('${bgUrl}')`;
                    // 如果有封面需要保留混合渐变，处理如下
                    if (el.classList.contains('cover') || el.classList.contains('cover-back')) {
                        // cover 直接用图片即可，不需要渐变
                    } else if (el.classList.contains('front')) {
                        el.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 8%), url('${bgUrl}')`;
                    } else if (el.classList.contains('back')) {
                        el.style.backgroundImage = `linear-gradient(to left, rgba(0,0,0,0.5) 0%, transparent 8%), url('${bgUrl}')`;
                    } else {
                        // 其他（如 flap）直接使用
                        el.style.backgroundImage = `url('${bgUrl}')`;
                    }
                    el.setAttribute('data-loaded', 'true');
                }
            });
        }

        function updateAllPageZIndex() {
            pages.forEach((p, i) => {
                const flipped = p.classList.contains('flipped');
                const stackZ = flipped ? i : (pages.length - i);
                p.style.setProperty('--z', stackZ);
                
                if (!p.classList.contains('flipping') && !p.classList.contains('is-expanded')) {
                    p.style.zIndex = stackZ;
                }

                const isFlipping = p.classList.contains('flipping');
                const isExpanded = p.classList.contains('is-expanded');
                
                // 仅保留当前阅读页以及前后 2 页，其他页面强制剔除释放内存
                const isVisible = isFlipping || isExpanded || (i >= currentPage - 2 && i <= currentPage + 2);
                
                if (isVisible) {
                    p.style.visibility = 'visible';
                    // 只要它进入了可视范围，立刻加载它的超清图片！
                    loadImagesForPage(p);
                } else {
                    p.style.visibility = 'hidden';
                }
            });
        }

        // 模拟预加载封面，保障极速进站
        function preloadInitialPages() {
            // 先加载前两页
            updateAllPageZIndex();
            
            // 为了让视觉体验好，随便加载一张背景图即可隐藏 Loading
            const img = new Image();
            img.src = '封面.jpg';
            img.onload = img.onerror = () => {
                loader.style.opacity = '0';
                appWrapper.classList.add('loaded');
                document.body.style.backgroundImage = "url('7af60992522253a99c4fdb994dca1423.png')";
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            };
        }

        function init() {
            preloadInitialPages();
            syncRenderLoop();
        }

        function getIsExp() { return !!document.querySelector('.page.is-expanded'); }

        function syncRenderLoop() {
            const isExp = getIsExp();
            const winW = window.innerWidth * 0.96;
            const viewW = isExp ? 8000 : 4000; 
            const baseS = Math.min(winW / viewW, 1.0);
            const scale = curS * baseS;
            
            manipulator.style.transform = `translate3d(${panX}px, ${panY}px, 0px) scale(${scale})`;
            
            let shift = 0;
            if (isExp) shift = -50; 
            else if (currentPage === 0) shift = -25;
            else if (currentPage === pages.length) shift = 25;
            book.style.transform = `translateX(${shift}%)`;
        }

        function startEngine() {
            if (isEngineRunning) return;
            isEngineRunning = true;

            function loop() {
                const sDiff = tarS - curS;
                const xDiff = tarPanX - panX;
                const yDiff = tarPanY - panY;

                if (Math.abs(sDiff) > 0.0001 || Math.abs(xDiff) > 0.5 || Math.abs(yDiff) > 0.5) {
                    curS += sDiff * 0.28;
                    panX += xDiff * 0.28;
                    panY += yDiff * 0.28;
                    syncRenderLoop();
                    requestAnimationFrame(loop);
                } else {
                    curS = tarS;
                    panX = tarPanX;
                    panY = tarPanY;
                    syncRenderLoop();
                    isEngineRunning = false;
                }
            }
            loop();
        }

        appWrapper.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            if (e.target.closest('.expand-btn')) return; 

            pointerCache.push(e);
            
            if (pointerCache.length === 1) {
                isDragging = true;
                isPinching = false;
                startPtrX = e.clientX / curS - tarPanX;
                startPtrY = e.clientY / curS - tarPanY;
                ptrMoveDist = 0;
                appWrapper.setPointerCapture(e.pointerId);
            } else if (pointerCache.length === 2) {
                isDragging = false; 
                isPinching = true;
                initialDistance = Math.hypot(
                    pointerCache[0].clientX - pointerCache[1].clientX,
                    pointerCache[0].clientY - pointerCache[1].clientY
                );
                initialScale = tarS;
            }
            e.preventDefault();
        });

        appWrapper.addEventListener('pointermove', (e) => {
            const index = pointerCache.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) pointerCache[index] = e;

            if (pointerCache.length === 2 && isPinching) {
                const currentDistance = Math.hypot(
                    pointerCache[0].clientX - pointerCache[1].clientX,
                    pointerCache[0].clientY - pointerCache[1].clientY
                );
                const scaleDiff = currentDistance / initialDistance;
                tarS = Math.min(Math.max(initialScale * scaleDiff, 0.4), 15.0);
                startEngine();
                return;
            }

            if (!isDragging) return;
            
            tarPanX = e.clientX / curS - startPtrX;
            tarPanY = e.clientY / curS - startPtrY;
            ptrMoveDist += Math.abs(e.movementX || 0) + Math.abs(e.movementY || 0);
            startEngine();
        });

        const handlePointerUp = (e) => {
            pointerCache = pointerCache.filter(p => p.pointerId !== e.pointerId);

            if (pointerCache.length < 2) {
                isPinching = false;
                initialDistance = 0;
            }

            if (pointerCache.length === 1) {
                isDragging = true;
                startPtrX = pointerCache[0].clientX / curS - tarPanX;
                startPtrY = pointerCache[0].clientY / curS - tarPanY;
            } else if (pointerCache.length === 0) {
                if (isDragging) {
                    isDragging = false;
                    appWrapper.releasePointerCapture(e.pointerId);

                    if (ptrMoveDist < 15 && !getIsExp()) {
                        const rect = book.getBoundingClientRect();
                        if (e.clientX < rect.left + rect.width / 2) goPrev(); else goNext();
                    }
                }
            }
        };

        appWrapper.addEventListener('pointerup', handlePointerUp);
        appWrapper.addEventListener('pointercancel', handlePointerUp);

        function goNext() {
            if (currentPage >= pages.length) return;
            const p = pages[currentPage];
            p.classList.add('flipping');
            p.style.setProperty('--lift', '800px'); 
            p.style.zIndex = "1000"; 
            p.classList.add('flipped');
            currentPage++;
            
            updateAllPageZIndex();
            
            setTimeout(() => {
                p.style.setProperty('--lift', '0px');
                p.classList.remove('flipping');
                updateAllPageZIndex(); 
            }, 1000);
            syncRenderLoop();
        }

        function goPrev() {
            if (currentPage <= 0) return;
            currentPage--;
            const p = pages[currentPage];
            p.classList.add('flipping');
            p.style.setProperty('--lift', '800px');
            p.style.zIndex = "1000";
            p.classList.remove('flipped');
            
            updateAllPageZIndex();
            
            setTimeout(() => {
                p.style.setProperty('--lift', '0px');
                p.classList.remove('flipping');
                updateAllPageZIndex();
            }, 1000);
            syncRenderLoop();
        }

        window.toggleFoldout = function(e, id) {
            e.preventDefault(); e.stopPropagation(); 
            const el = document.getElementById(id);
            const btn = e.currentTarget;
            if (!el.classList.contains('is-expanded')) {
                el.classList.add('is-expanded');
                btn.innerText = "收回全图";
                el.style.zIndex = "500000"; 
                el.style.setProperty('--lift', '2400px');
            } else {
                el.classList.remove('is-expanded');
                btn.innerText = "展开全图";
                el.style.setProperty('--lift', '0px');
            }
            updateAllPageZIndex();
            startEngine(); 
        };

        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            tarS = Math.min(Math.max(tarS - e.deltaY * 0.003, 0.4), 15.0);
            startEngine();
        }, { passive: false }); 

        window.addEventListener('resize', syncRenderLoop);
        
        // 启动
        init();
    </script>
</body>
</html>
